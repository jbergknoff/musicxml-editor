[build]
  # `make models` downloads the ONNX weights (gitignored, ~109 MB) into
  # public/models/ so the build copies them into dist/ and serves them
  # same-origin (required under COEP). It is a no-op once they are cached.
  command = "make models build"
  publish = "dist"

[build.environment]
  BUN_VERSION = "1"

# ORT Web's threaded WASM backend needs SharedArrayBuffer, which the browser
# only exposes to cross-origin-isolated pages. Mirror the COOP/COEP headers the
# dev server sets (scripts/serve.ts) so production behaves the same.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
