# Netlify deploys the editor (editor/): the WYSIWYG MusicXML editor. The build
# runs `make build-editor` at the repo root, emitting editor/dist/main.js, and
# publishes the editor/ directory (its index.html loads dist/main.js).
#
# The original import-image OMR app (the old pdf-to-musicxml pipeline) still
# lives under import-image/ with its own self-contained build, but is no longer
# the deploy target.
[build]
  command = "make build-editor"
  publish = "editor"

[build.environment]
  BUN_VERSION = "1"
